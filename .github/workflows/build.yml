name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.artifact-name.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - run: npm run compile

      - run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-dependencies

      - name: Set artifact name
        id: artifact-name
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=go-escape-vscode-extension-${{ github.ref_name }}.vsix" >> $GITHUB_OUTPUT
          else
            echo "name=go-escape-vscode-extension-$(echo '${{ github.sha }}' | cut -c1-7).vsix" >> $GITHUB_OUTPUT
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: "*.vsix"
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      - uses: actions/checkout@v6

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
